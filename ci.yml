name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Bağımlılıklar
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Tip kontrolü (tsc)
        run: npm run typecheck

      - name: API tipleri güncel mi (openapi-typescript drift guard)
        run: |
          npm run gen:api-types
          git diff --exit-code src/lib/api-types.ts \
            || (echo "::error::src/lib/api-types.ts, openapi.json ile güncel değil — 'npm run gen:api-types' çalıştırıp commit'leyin." && exit 1)

      - name: Build (next build)
        run: npm run build
